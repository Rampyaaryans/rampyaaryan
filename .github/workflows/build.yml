name: Build Rampyaaryan

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: make release
      - name: Test Examples
        run: |
          ./bin/rampyaaryan examples/01_namaste_duniya.ram
          ./bin/rampyaaryan examples/02_variables.ram
          ./bin/rampyaaryan examples/03_conditions.ram
          ./bin/rampyaaryan examples/04_loops.ram
          ./bin/rampyaaryan examples/05_functions.ram
          ./bin/rampyaaryan examples/06_lists.ram
          ./bin/rampyaaryan examples/08_sorting.ram
          ./bin/rampyaaryan examples/10_patterns.ram
      - name: Prepare release asset
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          cd bin
          tar czf ../Rampyaaryan-Linux-Portable.tar.gz rampyaaryan
      - name: Build .deb package
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          mkdir -p deb-pkg/DEBIAN
          mkdir -p deb-pkg/usr/local/bin
          mkdir -p deb-pkg/usr/share/mime/packages
          mkdir -p deb-pkg/usr/share/applications
          cp bin/rampyaaryan deb-pkg/usr/local/bin/
          chmod 755 deb-pkg/usr/local/bin/rampyaaryan
          cat > deb-pkg/DEBIAN/control << EOF
          Package: rampyaaryan
          Version: ${VERSION}
          Section: devel
          Priority: optional
          Architecture: amd64
          Maintainer: Rampyaaryans <rampyaaryan17@gmail.com>
          Homepage: https://github.com/Rampyaaryans/rampyaaryan
          Description: Rampyaaryan - Hinglish Programming Language
           India's first Hinglish programming language compiler.
           Write code in a mix of Hindi and English with intuitive keywords.
          EOF
          sed -i 's/^          //' deb-pkg/DEBIAN/control
          cat > deb-pkg/usr/share/applications/rampyaaryan.desktop << EOF
          [Desktop Entry]
          Name=Rampyaaryan
          Comment=Hinglish Programming Language
          Exec=rampyaaryan %f
          Terminal=true
          Type=Application
          MimeType=text/x-rampyaaryan;
          Categories=Development;IDE;
          EOF
          sed -i 's/^          //' deb-pkg/usr/share/applications/rampyaaryan.desktop
          cat > deb-pkg/usr/share/mime/packages/rampyaaryan.xml << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <mime-info xmlns="http://www.freedesktop.org/standards/shared-mime-info">
            <mime-type type="text/x-rampyaaryan">
              <comment>Rampyaaryan source file</comment>
              <glob pattern="*.ram"/>
            </mime-type>
          </mime-info>
          EOF
          sed -i 's/^          //' deb-pkg/usr/share/mime/packages/rampyaaryan.xml
          dpkg-deb --build deb-pkg Rampyaaryan.deb
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rampyaaryan-linux
          path: bin/rampyaaryan
      - name: Upload release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: release-linux
          path: |
            Rampyaaryan-Linux-Portable.tar.gz
            Rampyaaryan.deb

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: make release
      - name: Test
        run: ./bin/rampyaaryan examples/01_namaste_duniya.ram
      - name: Prepare release asset
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          cd bin
          tar czf ../Rampyaaryan-macOS-Portable.tar.gz rampyaaryan
      - name: Build macOS installer package
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          mkdir -p pkg-root/usr/local/bin
          cp bin/rampyaaryan pkg-root/usr/local/bin/
          chmod 755 pkg-root/usr/local/bin/rampyaaryan
          pkgbuild --root pkg-root \
                   --identifier com.rampyaaryans.rampyaaryan \
                   --version ${GITHUB_REF_NAME#v} \
                   --install-location / \
                   Rampyaaryan.pkg
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rampyaaryan-macos
          path: bin/rampyaaryan
      - name: Upload release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: release-macos
          path: |
            Rampyaaryan-macOS-Portable.tar.gz
            Rampyaaryan.pkg

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build with GCC
        run: |
          gcc -O3 -std=gnu99 -DNDEBUG -o rampyaaryan.exe src/memory.c src/value.c src/object.c src/table.c src/chunk.c src/lexer.c src/compiler.c src/vm.c src/native.c src/debug.c src/ascii_art.c src/main.c -lm
      - name: Test
        run: ./rampyaaryan.exe examples/01_namaste_duniya.ram
      - name: Prepare release asset
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          7z a Rampyaaryan-Windows-Portable.zip rampyaaryan.exe
      - name: Convert logo to ICO for installer
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          magick vscode-extension/images/icon.png -define icon:auto-resize=256,128,64,48,32,16 scripts/icon.ico
      - name: Build Windows installer
        if: startsWith(github.ref, 'refs/tags/')
        shell: cmd
        run: |
          "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" scripts\installer.iss
          copy installer-output\Rampyaaryan.exe Rampyaaryan.exe
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rampyaaryan-windows
          path: rampyaaryan.exe
      - name: Upload release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: release-windows
          path: |
            Rampyaaryan-Windows-Portable.zip
            Rampyaaryan.exe

  build-vscode-extension:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install vsce
        run: npm install -g @vscode/vsce
      - name: Package Extension
        working-directory: vscode-extension
        run: vsce package --no-dependencies
      - name: Upload VSIX
        uses: actions/upload-artifact@v4
        with:
          name: rampyaaryan-vscode-extension
          path: vscode-extension/*.vsix
      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: release-vsix
          path: vscode-extension/*.vsix

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-linux, build-macos, build-windows, build-vscode-extension]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all release assets
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: release-assets
          merge-multiple: true

      - name: List release assets
        run: ls -la release-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: |
            ## Rampyaaryan — Hinglish Programming Language

            ### Installers (Recommended)
            | File | Platform | Description |
            |------|----------|-------------|
            | **Rampyaaryan.exe** | Windows | Windows installer — auto-adds to PATH, includes uninstaller |
            | **Rampyaaryan.deb** | Linux (Debian/Ubuntu) | Debian package — install with `sudo dpkg -i Rampyaaryan.deb` |
            | **Rampyaaryan.pkg** | macOS | macOS installer package — installs to `/usr/local/bin` |

            ### Portable Binaries
            | File | Platform | Description |
            |------|----------|-------------|
            | Rampyaaryan-Windows-Portable.zip | Windows | Standalone binary — extract and run |
            | Rampyaaryan-Linux-Portable.tar.gz | Linux | Standalone binary — extract and add to PATH |
            | Rampyaaryan-macOS-Portable.tar.gz | macOS | Standalone binary — extract and add to PATH |

            ### VS Code Extension
            | File | Description |
            |------|-------------|
            | *.vsix | VS Code extension — syntax highlighting, themes, file icons |
          files: |
            release-assets/Rampyaaryan.exe
            release-assets/Rampyaaryan.deb
            release-assets/Rampyaaryan.pkg
            release-assets/Rampyaaryan-Windows-Portable.zip
            release-assets/Rampyaaryan-Linux-Portable.tar.gz
            release-assets/Rampyaaryan-macOS-Portable.tar.gz
            release-assets/*.vsix
