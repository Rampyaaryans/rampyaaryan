name: Build Rampyaaryan

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: make release
      - name: Test Examples
        run: |
          ./bin/rampyaaryan examples/01_namaste_duniya.ram
          ./bin/rampyaaryan examples/02_variables.ram
          ./bin/rampyaaryan examples/03_conditions.ram
          ./bin/rampyaaryan examples/04_loops.ram
          ./bin/rampyaaryan examples/05_functions.ram
          ./bin/rampyaaryan examples/06_lists.ram
          ./bin/rampyaaryan examples/08_sorting.ram
          ./bin/rampyaaryan examples/10_patterns.ram
      - name: Prepare release asset
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          cd bin
          tar czf ../rampyaaryan-linux-x64.tar.gz rampyaaryan
      - name: Build .deb package
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          mkdir -p deb-pkg/DEBIAN
          mkdir -p deb-pkg/usr/local/bin
          cp bin/rampyaaryan deb-pkg/usr/local/bin/
          chmod 755 deb-pkg/usr/local/bin/rampyaaryan
          cat > deb-pkg/DEBIAN/control << EOF
          Package: rampyaaryan
          Version: ${VERSION}
          Section: devel
          Priority: optional
          Architecture: amd64
          Maintainer: Rampyaaryans <rampyaaryan17@gmail.com>
          Homepage: https://github.com/Rampyaaryans/rampyaaryan
          Description: Rampyaaryan - Hinglish Programming Language
           India's first Hinglish programming language compiler.
           Write code in a mix of Hindi and English with intuitive keywords.
          EOF
          sed -i 's/^          //' deb-pkg/DEBIAN/control
          dpkg-deb --build deb-pkg rampyaaryan-linux-x64.deb
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rampyaaryan-linux
          path: bin/rampyaaryan
      - name: Upload release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: release-linux
          path: |
            rampyaaryan-linux-x64.tar.gz
            rampyaaryan-linux-x64.deb

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: make release
      - name: Test
        run: ./bin/rampyaaryan examples/01_namaste_duniya.ram
      - name: Prepare release asset
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          cd bin
          tar czf ../rampyaaryan-macos-x64.tar.gz rampyaaryan
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rampyaaryan-macos
          path: bin/rampyaaryan
      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: release-macos
          path: rampyaaryan-macos-x64.tar.gz

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build with GCC
        run: |
          gcc -O3 -std=gnu99 -DNDEBUG -o rampyaaryan.exe src/memory.c src/value.c src/object.c src/table.c src/chunk.c src/lexer.c src/compiler.c src/vm.c src/native.c src/debug.c src/ascii_art.c src/main.c -lm
      - name: Test
        run: ./rampyaaryan.exe examples/01_namaste_duniya.ram
      - name: Prepare release asset
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          7z a rampyaaryan-windows-x64.zip rampyaaryan.exe
      - name: Build Windows installer
        if: startsWith(github.ref, 'refs/tags/')
        shell: cmd
        run: |
          "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" scripts\installer.iss
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rampyaaryan-windows
          path: rampyaaryan.exe
      - name: Upload release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: release-windows
          path: |
            rampyaaryan-windows-x64.zip
            installer-output/rampyaaryan-windows-x64-setup.exe

  build-vscode-extension:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install vsce
        run: npm install -g @vscode/vsce
      - name: Package Extension
        working-directory: vscode-extension
        run: vsce package --no-dependencies
      - name: Upload VSIX
        uses: actions/upload-artifact@v4
        with:
          name: rampyaaryan-vscode-extension
          path: vscode-extension/*.vsix
      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: release-vsix
          path: vscode-extension/*.vsix

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-linux, build-macos, build-windows, build-vscode-extension]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all release assets
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: release-assets
          merge-multiple: true

      - name: List release assets
        run: ls -la release-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release-assets/rampyaaryan-linux-x64.tar.gz
            release-assets/rampyaaryan-linux-x64.deb
            release-assets/rampyaaryan-macos-x64.tar.gz
            release-assets/rampyaaryan-windows-x64.zip
            release-assets/rampyaaryan-windows-x64-setup.exe
            release-assets/*.vsix
