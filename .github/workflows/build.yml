name: Build Rampyaaryan

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  release:
    types: [ created ]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: make release
      - name: Test Examples
        run: |
          ./bin/rampyaaryan examples/01_namaste_duniya.ram
          ./bin/rampyaaryan examples/02_variables.ram
          ./bin/rampyaaryan examples/03_conditions.ram
          ./bin/rampyaaryan examples/04_loops.ram
          ./bin/rampyaaryan examples/05_functions.ram
          ./bin/rampyaaryan examples/06_lists.ram
          ./bin/rampyaaryan examples/08_sorting.ram
          ./bin/rampyaaryan examples/10_patterns.ram
      - name: Upload Linux Binary
        uses: actions/upload-artifact@v4
        with:
          name: rampyaaryan-linux
          path: bin/rampyaaryan

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: make release
      - name: Test
        run: ./bin/rampyaaryan examples/01_namaste_duniya.ram
      - name: Upload macOS Binary
        uses: actions/upload-artifact@v4
        with:
          name: rampyaaryan-macos
          path: bin/rampyaaryan

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build with GCC
        run: |
          gcc -O2 -o rampyaaryan.exe src/memory.c src/value.c src/object.c src/table.c src/chunk.c src/lexer.c src/compiler.c src/vm.c src/native.c src/debug.c src/ascii_art.c src/main.c -lm
      - name: Test
        run: ./rampyaaryan.exe examples/01_namaste_duniya.ram
      - name: Upload Windows Binary
        uses: actions/upload-artifact@v4
        with:
          name: rampyaaryan-windows
          path: rampyaaryan.exe
