<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 420" style="max-width:100%;height:auto">
  <defs>
    <filter id="vs" x="-3%" y="-3%" width="106%" height="112%">
      <feDropShadow dx="2" dy="2" stdDeviation="2.5" flood-color="#000" flood-opacity="0.10"/>
    </filter>
    <marker id="va" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="5" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10z" fill="#5a4e3c"/>
    </marker>
    <marker id="vad" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="4" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10z" fill="#8a7e6c"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="850" height="420" rx="12" fill="#faf8f4" stroke="#d4c9b8" stroke-width="1.5"/>

  <!-- Title -->
  <text x="425" y="28" text-anchor="middle" font-family="Inter,'Segoe UI',system-ui,sans-serif" font-size="13" font-weight="700" fill="#2c2416" letter-spacing="1.5">VIRTUAL MACHINE — EXECUTION MODEL</text>
  <line x1="270" y1="36" x2="580" y2="36" stroke="#c0392b" stroke-width="2" opacity="0.5"/>

  <!-- ═══ VM CONTAINER ═══ -->
  <rect x="15" y="48" width="820" height="320" rx="10" fill="none" stroke="#b85450" stroke-width="1.8" stroke-dasharray="8,4" opacity="0.35"/>
  <text x="30" y="66" font-family="Inter,sans-serif" font-size="9" font-weight="600" fill="#b85450" opacity="0.6" letter-spacing="1">VM RUNTIME</text>

  <!-- ═══ DISPATCH LOOP (top center) ═══ -->
  <rect x="175" y="72" width="500" height="72" rx="8" fill="#f8cecc" stroke="#b85450" stroke-width="1.5" filter="url(#vs)"/>
  <text x="425" y="94" text-anchor="middle" font-family="Inter,sans-serif" font-size="12" font-weight="700" fill="#7a2420">Instruction Dispatch Loop</text>

  <!-- Cycle: FETCH → DECODE → EXECUTE → repeat -->
  <rect x="210" y="104" width="68" height="26" rx="5" fill="#fae3e1" stroke="#b85450" stroke-width="1"/>
  <text x="244" y="121" text-anchor="middle" font-family="Inter,sans-serif" font-size="10" font-weight="600" fill="#7a2420">FETCH</text>

  <line x1="278" y1="117" x2="318" y2="117" stroke="#b85450" stroke-width="1.5" marker-end="url(#va)"/>

  <rect x="324" y="104" width="76" height="26" rx="5" fill="#fae3e1" stroke="#b85450" stroke-width="1"/>
  <text x="362" y="121" text-anchor="middle" font-family="Inter,sans-serif" font-size="10" font-weight="600" fill="#7a2420">DECODE</text>

  <line x1="400" y1="117" x2="440" y2="117" stroke="#b85450" stroke-width="1.5" marker-end="url(#va)"/>

  <rect x="446" y="104" width="80" height="26" rx="5" fill="#fae3e1" stroke="#b85450" stroke-width="1"/>
  <text x="486" y="121" text-anchor="middle" font-family="Inter,sans-serif" font-size="10" font-weight="600" fill="#7a2420">EXECUTE</text>

  <!-- Cycle arrow back -->
  <path d="M526 117 L555 117 Q570 117 570 104 L570 90 Q570 78 555 78 L210 78 Q195 78 195 90 L195 104" stroke="#b85450" stroke-width="1.2" fill="none" marker-end="url(#va)" opacity="0.5"/>
  <text x="585" y="100" font-family="Inter,sans-serif" font-size="8" fill="#994440" opacity="0.6">repeat</text>

  <!-- ═══ FOUR COMPONENT BOXES (middle row) ═══ -->

  <!-- Value Stack -->
  <rect x="30" y="170" width="182" height="115" rx="8" fill="#dae8fc" stroke="#6c8ebf" stroke-width="1.5" filter="url(#vs)"/>
  <text x="121" y="193" text-anchor="middle" font-family="Inter,sans-serif" font-size="11.5" font-weight="700" fill="#1a3a5c">Value Stack</text>
  <line x1="48" y1="200" x2="194" y2="200" stroke="#6c8ebf" stroke-width="0.7" opacity="0.4"/>

  <!-- Stack slots visualization -->
  <rect x="50" y="210" width="40" height="24" rx="3" fill="#b8d4f0" stroke="#6c8ebf" stroke-width="1"/>
  <text x="70" y="226" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="8.5" fill="#1a3a5c">42</text>
  <rect x="90" y="210" width="40" height="24" rx="3" fill="#b8d4f0" stroke="#6c8ebf" stroke-width="1"/>
  <text x="110" y="226" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="8.5" fill="#1a3a5c">"hi"</text>
  <rect x="130" y="210" width="40" height="24" rx="3" fill="#b8d4f0" stroke="#6c8ebf" stroke-width="1"/>
  <text x="150" y="226" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="8.5" fill="#1a3a5c">sach</text>
  <rect x="170" y="210" width="30" height="24" rx="3" fill="#dae8fc" stroke="#6c8ebf" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="185" y="226" text-anchor="middle" font-family="Inter,sans-serif" font-size="8" fill="#6c8ebf">···</text>

  <!-- SP arrow -->
  <line x1="185" y1="245" x2="185" y2="260" stroke="#6c8ebf" stroke-width="1" marker-end="url(#vad)"/>
  <text x="186" y="272" text-anchor="middle" font-family="Inter,sans-serif" font-size="8" font-weight="600" fill="#6c8ebf">SP ↑</text>

  <!-- Call Frames -->
  <rect x="228" y="170" width="182" height="115" rx="8" fill="#d5e8d4" stroke="#82b366" stroke-width="1.5" filter="url(#vs)"/>
  <text x="319" y="193" text-anchor="middle" font-family="Inter,sans-serif" font-size="11.5" font-weight="700" fill="#2d5a1e">Call Frames</text>
  <line x1="246" y1="200" x2="392" y2="200" stroke="#82b366" stroke-width="0.7" opacity="0.4"/>

  <!-- Frame stack visualization -->
  <rect x="248" y="208" width="142" height="22" rx="3" fill="#c4ddc2" stroke="#82b366" stroke-width="1"/>
  <text x="319" y="224" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="8" fill="#2d5a1e">main() — ip:0x04, slots:0</text>

  <rect x="248" y="233" width="142" height="22" rx="3" fill="#b8d4b6" stroke="#82b366" stroke-width="1"/>
  <text x="319" y="249" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="8" fill="#2d5a1e">kaam() — ip:0x12, slots:3</text>

  <rect x="248" y="258" width="142" height="22" rx="3" fill="#a8c8a6" stroke="#82b366" stroke-width="1"/>
  <text x="319" y="274" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="8" fill="#2d5a1e">lambda — ip:0x1f, slots:5</text>

  <!-- Globals Table -->
  <rect x="426" y="170" width="182" height="115" rx="8" fill="#fff2cc" stroke="#d6b656" stroke-width="1.5" filter="url(#vs)"/>
  <text x="517" y="193" text-anchor="middle" font-family="Inter,sans-serif" font-size="11.5" font-weight="700" fill="#7a6420">Globals Table</text>
  <line x1="444" y1="200" x2="590" y2="200" stroke="#d6b656" stroke-width="0.7" opacity="0.4"/>

  <!-- Hash table visualization -->
  <rect x="440" y="208" width="80" height="18" rx="2" fill="#ffe8a0" stroke="#d6b656" stroke-width="0.8"/>
  <text x="480" y="221" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="7.5" fill="#7a6420">"naam" → "Ram"</text>

  <rect x="440" y="229" width="80" height="18" rx="2" fill="#ffe8a0" stroke="#d6b656" stroke-width="0.8"/>
  <text x="480" y="242" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="7.5" fill="#7a6420">"umar" → 21</text>

  <rect x="440" y="250" width="80" height="18" rx="2" fill="#ffe8a0" stroke="#d6b656" stroke-width="0.8"/>
  <text x="480" y="263" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="7.5" fill="#7a6420">"sach" → sach</text>

  <!-- Open addressing note -->
  <text x="555" y="222" font-family="Inter,sans-serif" font-size="8" fill="#8a7430">Open</text>
  <text x="555" y="234" font-family="Inter,sans-serif" font-size="8" fill="#8a7430">addressing</text>
  <text x="555" y="246" font-family="Inter,sans-serif" font-size="8" fill="#8a7430">hash table</text>
  <text x="555" y="258" font-family="Inter,sans-serif" font-size="8" fill="#8a7430">FNV-1a</text>

  <!-- Constant Pool -->
  <rect x="624" y="170" width="196" height="115" rx="8" fill="#e1d5e7" stroke="#9673a6" stroke-width="1.5" filter="url(#vs)"/>
  <text x="722" y="193" text-anchor="middle" font-family="Inter,sans-serif" font-size="11.5" font-weight="700" fill="#5b3a6e">Constant Pool</text>
  <line x1="642" y1="200" x2="802" y2="200" stroke="#9673a6" stroke-width="0.7" opacity="0.4"/>

  <!-- Constants visualization -->
  <rect x="638" y="208" width="24" height="18" rx="2" fill="#d4c4de" stroke="#9673a6" stroke-width="0.8"/>
  <text x="650" y="221" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="7.5" fill="#5b3a6e">[0]</text>
  <text x="680" y="221" font-family="'JetBrains Mono',monospace" font-size="8" fill="#5b3a6e">3.14</text>

  <rect x="638" y="229" width="24" height="18" rx="2" fill="#d4c4de" stroke="#9673a6" stroke-width="0.8"/>
  <text x="650" y="242" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="7.5" fill="#5b3a6e">[1]</text>
  <text x="680" y="242" font-family="'JetBrains Mono',monospace" font-size="8" fill="#5b3a6e">"namaste"</text>

  <rect x="638" y="250" width="24" height="18" rx="2" fill="#d4c4de" stroke="#9673a6" stroke-width="0.8"/>
  <text x="650" y="263" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="7.5" fill="#5b3a6e">[2]</text>
  <text x="680" y="263" font-family="'JetBrains Mono',monospace" font-size="8" fill="#5b3a6e">&lt;fn ganana&gt;</text>

  <!-- Interned strings note -->
  <text x="760" y="222" font-family="Inter,sans-serif" font-size="8" fill="#7a5a8e">Literals,</text>
  <text x="760" y="234" font-family="Inter,sans-serif" font-size="8" fill="#7a5a8e">strings,</text>
  <text x="760" y="246" font-family="Inter,sans-serif" font-size="8" fill="#7a5a8e">function</text>
  <text x="760" y="258" font-family="Inter,sans-serif" font-size="8" fill="#7a5a8e">objects</text>

  <!-- Connecting arrows: Dispatch → components -->
  <line x1="300" y1="144" x2="121" y2="168" stroke="#5a4e3c" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#vad)" opacity="0.5"/>
  <line x1="370" y1="144" x2="319" y2="168" stroke="#5a4e3c" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#vad)" opacity="0.5"/>
  <line x1="460" y1="144" x2="517" y2="168" stroke="#5a4e3c" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#vad)" opacity="0.5"/>
  <line x1="530" y1="144" x2="722" y2="168" stroke="#5a4e3c" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#vad)" opacity="0.5"/>

  <!-- ═══ GARBAGE COLLECTOR (bottom bar) ═══ -->
  <rect x="30" y="305" width="790" height="55" rx="8" fill="#ffe6cc" stroke="#d79b00" stroke-width="1.5" filter="url(#vs)"/>
  <text x="425" y="328" text-anchor="middle" font-family="Inter,sans-serif" font-size="12" font-weight="700" fill="#7a5000">Garbage Collector — Tri-Color Mark-Sweep</text>

  <!-- GC object chain -->
  <rect x="80" y="336" width="60" height="18" rx="3" fill="#ffd699" stroke="#d79b00" stroke-width="0.8"/>
  <text x="110" y="349" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="7.5" fill="#7a5000">ObjString</text>

  <line x1="140" y1="345" x2="163" y2="345" stroke="#d79b00" stroke-width="1" marker-end="url(#vad)"/>

  <rect x="168" y="336" width="70" height="18" rx="3" fill="#ffd699" stroke="#d79b00" stroke-width="0.8"/>
  <text x="203" y="349" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="7.5" fill="#7a5000">ObjFunction</text>

  <line x1="238" y1="345" x2="261" y2="345" stroke="#d79b00" stroke-width="1" marker-end="url(#vad)"/>

  <rect x="266" y="336" width="65" height="18" rx="3" fill="#ffd699" stroke="#d79b00" stroke-width="0.8"/>
  <text x="298" y="349" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="7.5" fill="#7a5000">ObjClosure</text>

  <line x1="331" y1="345" x2="354" y2="345" stroke="#d79b00" stroke-width="1" marker-end="url(#vad)"/>

  <rect x="359" y="336" width="50" height="18" rx="3" fill="#ffd699" stroke="#d79b00" stroke-width="0.8"/>
  <text x="384" y="349" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="7.5" fill="#7a5000">ObjList</text>

  <line x1="409" y1="345" x2="432" y2="345" stroke="#d79b00" stroke-width="1" marker-end="url(#vad)"/>

  <rect x="437" y="336" width="50" height="18" rx="3" fill="#ffd699" stroke="#d79b00" stroke-width="0.8"/>
  <text x="462" y="349" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="7.5" fill="#7a5000">ObjMap</text>

  <line x1="487" y1="345" x2="510" y2="345" stroke="#d79b00" stroke-width="1" marker-end="url(#vad)"/>

  <rect x="515" y="336" width="55" height="18" rx="3" fill="#ffd699" stroke="#d79b00" stroke-width="0.8"/>
  <text x="542" y="349" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="7.5" fill="#7a5000">ObjClass</text>

  <line x1="570" y1="345" x2="593" y2="345" stroke="#d79b00" stroke-width="1" marker-end="url(#vad)"/>

  <text x="610" y="349" font-family="Inter,sans-serif" font-size="9" fill="#7a5000">···  → NULL</text>

  <!-- Arrows: GC ↔ Value Stack, Call Frames -->
  <line x1="121" y1="285" x2="121" y2="303" stroke="#d79b00" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#vad)" opacity="0.4"/>
  <line x1="319" y1="285" x2="319" y2="303" stroke="#d79b00" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#vad)" opacity="0.4"/>

  <!-- Footer -->
  <text x="425" y="395" text-anchor="middle" font-family="Inter,sans-serif" font-size="9.5" fill="#8a7e6c" letter-spacing="2">STACK VM · CLOSURES · UPVALUES · AUTOMATIC MEMORY MANAGEMENT</text>
</svg>
